    <text x="676" y="112" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.38)">Scanning...</text>
    <text x="676" y="128" font-family="'Courier New',monospace" font-size="10.5" fill="#28c840">PORT 443 OPEN ✓</text>
    <text x="676" y="150" font-family="'Courier New',monospace" font-size="10.5" fill="#a855f7">$</text>
    <text x="688" y="150" font-family="'Courier New',monospace" font-size="10.5" fill="#e0e0e0">whoami</text>
